<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<title>Receipt Inbox</title>

<meta name="description" content="Snap a receipt and email it to your finance inbox.">
<meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)">

<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Receipts">
<link rel="manifest" href="manifest.json">

<style>
:root {
    --tint: #007aff;
    --tint-pressed: #0064d4;
    --bg: #ffffff;
    --bg-grouped: #f2f2f7;
    --bg-elevated: #ffffff;
    --text: #000000;
    --text-secondary: rgba(60, 60, 67, 0.6);
    --text-tertiary: rgba(60, 60, 67, 0.3);
    --separator: rgba(60, 60, 67, 0.12);
    --separator-opaque: #c6c6c8;
    --warn: #ff9500;
    --error: #ff3b30;
    --success: #34c759;
    --shadow-button: 0 8px 24px rgba(0, 122, 255, 0.32);
    --shadow-toast: 0 8px 24px rgba(0, 0, 0, 0.16);
    --shadow-sheet: 0 -8px 32px rgba(0, 0, 0, 0.12);
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
    --safe-left: env(safe-area-inset-left, 0px);
    --safe-right: env(safe-area-inset-right, 0px);
}

@media (prefers-color-scheme: dark) {
    :root {
        --tint: #0a84ff;
        --tint-pressed: #006bd6;
        --bg: #000000;
        --bg-grouped: #000000;
        --bg-elevated: #1c1c1e;
        --text: #ffffff;
        --text-secondary: rgba(235, 235, 245, 0.6);
        --text-tertiary: rgba(235, 235, 245, 0.3);
        --separator: rgba(84, 84, 88, 0.65);
        --separator-opaque: #38383a;
    }
}

* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { margin: 0; padding: 0; height: 100%; overscroll-behavior-y: contain; }
body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    -webkit-user-select: none;
    user-select: none;
    -webkit-touch-callout: none;
    line-height: 1.4;
    -webkit-font-smoothing: antialiased;
}

/* === Home screen === */
.app {
    display: flex; flex-direction: column;
    min-height: 100vh; min-height: 100dvh;
    padding-top: var(--safe-top);
    padding-bottom: var(--safe-bottom);
    padding-left: var(--safe-left);
    padding-right: var(--safe-right);
}

.header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 16px;
    flex-shrink: 0;
}

.dest-pill {
    display: inline-flex; align-items: center; gap: 6px;
    background: none; border: 0; padding: 8px 0;
    color: var(--text-secondary);
    font-size: 14px; font-weight: 500;
    max-width: 240px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    cursor: default;
}
.dest-pill svg { flex-shrink: 0; }

.icon-btn {
    background: none; border: 0; padding: 8px;
    color: var(--tint); cursor: pointer;
    display: inline-flex; align-items: center; justify-content: center;
}
.icon-btn:active { color: var(--tint-pressed); }

.main {
    flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 32px 24px; gap: 28px;
}

.hero-icon { color: var(--tint); opacity: 0.95; }

.title {
    font-size: 34px; font-weight: 700;
    letter-spacing: -0.4px;
    margin: 0; text-align: center;
}

.subtitle {
    text-align: center; color: var(--text-secondary);
    font-size: 15px; padding: 0 8px;
    max-width: 320px;
    margin: 0;
}

.capture-btn {
    width: 220px; height: 220px; border-radius: 50%;
    background: var(--tint); color: white; border: 0;
    font-size: 22px; font-weight: 700;
    box-shadow: var(--shadow-button);
    cursor: pointer; transition: transform 0.1s, background 0.1s;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px;
    margin-top: 8px;
}
.capture-btn:active { transform: scale(0.96); background: var(--tint-pressed); }

.footer-text {
    color: var(--text-secondary);
    font-size: 13px;
    text-align: center;
    padding: 24px 16px 16px;
}

/* === Toast === */
.toast {
    position: fixed; bottom: calc(24px + var(--safe-bottom)); left: 50%; transform: translateX(-50%);
    background: rgba(0, 0, 0, 0.88); color: white;
    padding: 10px 18px; border-radius: 999px;
    font-size: 14px; font-weight: 500;
    opacity: 0; transition: opacity 0.2s;
    pointer-events: none;
    box-shadow: var(--shadow-toast);
    z-index: 100;
    max-width: calc(100vw - 32px);
    text-align: center;
}
.toast.show { opacity: 1; }
.toast.success { background: var(--success); }
.toast.error { background: var(--error); }

/* === Camera screen === */
.camera-screen {
    position: fixed; inset: 0;
    background: #000;
    z-index: 50;
    display: none;
    overflow: hidden;
}
.camera-screen.open { display: block; }

.camera-video {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    object-fit: cover;
}

/* Frame guide — receipt shape, vignette around it */
.guide-overlay {
    position: absolute; inset: 0;
    pointer-events: none;
    /* The vignette is a thick semi-transparent border on the box-shadow */
}
.guide-frame {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    /* Bounded by viewport so we never overlap top X/flash buttons or bottom shutter */
    width: min(75vw, 320px);
    height: min(55vh, 480px);
    border-radius: 8px;
    /* Vignette only — no dashed border */
    box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.45);
}
.guide-corners {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: min(75vw, 320px);
    height: min(55vh, 480px);
    pointer-events: none;
}
.guide-corners::before,
.guide-corners::after,
.guide-corners > span::before,
.guide-corners > span::after {
    content: "";
    position: absolute;
    width: 24px; height: 24px;
    border: 3px solid rgba(255, 255, 255, 0.95);
}
.guide-corners::before { top: -2px; left: -2px; border-right: 0; border-bottom: 0; border-radius: 8px 0 0 0; }
.guide-corners::after  { top: -2px; right: -2px; border-left: 0; border-bottom: 0; border-radius: 0 8px 0 0; }
.guide-corners > span::before { content: ""; bottom: -2px; left: -2px; border-right: 0; border-top: 0; border-radius: 0 0 0 8px; position: absolute; }
.guide-corners > span::after  { content: ""; bottom: -2px; right: -2px; border-left: 0; border-top: 0; border-radius: 0 0 8px 0; position: absolute; }

.guide-hint {
    position: absolute;
    top: calc(env(safe-area-inset-top, 0px) + 76px);
    left: 50%; transform: translateX(-50%);
    color: white;
    font-size: 14px; font-weight: 500;
    background: rgba(0, 0, 0, 0.45);
    padding: 6px 14px; border-radius: 999px;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    pointer-events: none;
    text-align: center;
    white-space: nowrap;
}

.camera-topbar {
    position: absolute;
    top: env(safe-area-inset-top, 0px); left: 0; right: 0;
    display: flex; justify-content: space-between; align-items: center;
    padding: 16px;
    z-index: 10;
}
.camera-topbar button {
    width: 44px; height: 44px; border-radius: 50%;
    background: rgba(0, 0, 0, 0.5);
    color: white; border: 0;
    display: inline-flex; align-items: center; justify-content: center;
    cursor: pointer; backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
}
.camera-topbar button:active { background: rgba(0, 0, 0, 0.75); }
.camera-topbar button.active { background: rgba(255, 220, 0, 0.95); color: #000; }

/* Subtle gradient at the bottom so the shutter button is visible on bright scenes */
.camera-bottom-fade {
    position: absolute;
    left: 0; right: 0;
    bottom: 0;
    height: calc(180px + var(--safe-bottom));
    background: linear-gradient(to top, rgba(0,0,0,0.55), rgba(0,0,0,0));
    pointer-events: none;
    z-index: 5;
}

.shutter-btn {
    position: absolute;
    left: 50%;
    bottom: calc(32px + var(--safe-bottom));
    transform: translateX(-50%);
    width: 76px; height: 76px; border-radius: 50%;
    background: white;
    border: 0;
    cursor: pointer;
    transition: transform 0.1s;
    box-shadow:
        0 0 0 4px rgba(0, 0, 0, 0.15),
        0 0 0 6px rgba(255, 255, 255, 0.95);
    z-index: 10;
}
.shutter-btn:active { transform: translateX(-50%) scale(0.92); }
.shutter-btn:disabled { opacity: 0.5; cursor: not-allowed; }

/* === Sending overlay === */
.sending-overlay {
    position: fixed; inset: 0;
    background: rgba(0, 0, 0, 0.6);
    display: none; align-items: center; justify-content: center;
    z-index: 60;
    color: white;
    flex-direction: column; gap: 16px;
    backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
}
.sending-overlay.open { display: flex; }
.spinner {
    width: 48px; height: 48px;
    border-radius: 50%;
    border: 4px solid rgba(255, 255, 255, 0.25);
    border-top-color: white;
    animation: spin 0.9s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>

<body>

<div class="app">
    <header class="header">
        <span class="dest-pill" id="destPill">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <rect x="3" y="6" width="18" height="13" rx="2"/>
                <path d="m3 8 9 6 9-6"/>
            </svg>
            <span id="destLabel">receipts@risechurchdecatur.com</span>
        </span>
        <span></span>
    </header>

    <main class="main">
        <svg class="hero-icon" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M3 7V5a2 2 0 0 1 2-2h2"/>
            <path d="M17 3h2a2 2 0 0 1 2 2v2"/>
            <path d="M21 17v2a2 2 0 0 1-2 2h-2"/>
            <path d="M7 21H5a2 2 0 0 1-2-2v-2"/>
            <rect x="7" y="7" width="10" height="10" rx="1.5"/>
        </svg>

        <h1 class="title">Receipt Inbox</h1>
        <p class="subtitle">Tap Capture, frame the receipt inside the guide, and it sends straight to the finance inbox.</p>

        <button class="capture-btn" id="openCameraBtn" aria-label="Capture a receipt">
            <svg width="56" height="56" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                <path d="M9 3 7.17 5H4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-3.17L15 3H9zm3 5a5 5 0 1 1 0 10 5 5 0 0 1 0-10zm0 2a3 3 0 1 0 0 6 3 3 0 0 0 0-6z"/>
            </svg>
            <span>Capture</span>
        </button>

        <div style="flex: 1"></div>

        <p class="footer-text">Sends to <strong>receipts@risechurchdecatur.com</strong></p>
    </main>
</div>

<!-- Camera screen -->
<div class="camera-screen" id="cameraScreen">
    <video class="camera-video" id="cameraVideo" autoplay muted playsinline></video>
    <div class="guide-overlay" id="guideOverlay">
        <div class="guide-frame"></div>
        <div class="guide-corners"><span></span></div>
        <div class="guide-hint">Frame the receipt inside the box</div>
    </div>
    <div class="camera-topbar">
        <button id="cancelCameraBtn" aria-label="Cancel">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <line x1="18" y1="6" x2="6" y2="18"/>
                <line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
        </button>
        <button id="torchBtn" aria-label="Toggle flashlight" style="display:none">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M13 2 4 14h6l-2 8 10-12h-6l1-8z"/></svg>
        </button>
    </div>
    <div class="camera-bottom-fade"></div>
    <button class="shutter-btn" id="shutterBtn" aria-label="Take photo"></button>
</div>

<!-- Sending overlay -->
<div class="sending-overlay" id="sendingOverlay">
    <div class="spinner"></div>
    <div id="sendingText">Sending receipt…</div>
</div>

<div id="toast" class="toast" role="status"></div>

<script>
(function() {
    'use strict';

    // === Config ===
    const SEND_URL = 'https://receipt-inbox-mailer.brandon-pelton77.workers.dev/send';
    const KEY_NAME = 'receipt-inbox.name';

    // === DOM refs ===
    const openCameraBtn = document.getElementById('openCameraBtn');
    const cameraScreen = document.getElementById('cameraScreen');
    const cameraVideo = document.getElementById('cameraVideo');
    const cancelCameraBtn = document.getElementById('cancelCameraBtn');
    const torchBtn = document.getElementById('torchBtn');
    const shutterBtn = document.getElementById('shutterBtn');
    const sendingOverlay = document.getElementById('sendingOverlay');
    const sendingText = document.getElementById('sendingText');
    const toast = document.getElementById('toast');

    // === Toast ===
    let toastTimer = null;
    function showToast(text, kind, durationMs) {
        toast.textContent = text;
        toast.className = 'toast show ' + (kind || '');
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => toast.classList.remove('show'), durationMs || 2400);
    }

    // === Camera ===
    let mediaStream = null;
    let torchTrack = null;
    let torchOn = false;

    async function openCamera() {
        try {
            mediaStream = await navigator.mediaDevices.getUserMedia({
                video: {
                    facingMode: { ideal: 'environment' },
                    width: { ideal: 1920 },
                    height: { ideal: 2560 },
                },
                audio: false,
            });
            cameraVideo.srcObject = mediaStream;
            cameraScreen.classList.add('open');

            // Torch (flashlight) detection
            const track = mediaStream.getVideoTracks()[0];
            const caps = track.getCapabilities ? track.getCapabilities() : {};
            if (caps.torch) {
                torchTrack = track;
                torchBtn.style.display = '';
                torchBtn.classList.remove('active');
                torchOn = false;
            } else {
                torchTrack = null;
                torchBtn.style.display = 'none';
            }
        } catch (err) {
            console.error('camera error:', err);
            const name = err && err.name;
            if (name === 'NotAllowedError' || name === 'SecurityError') {
                showToast('Camera permission denied. Enable in iOS Settings → Safari → Camera.', 'error', 5000);
            } else if (name === 'NotFoundError') {
                showToast('No camera found.', 'error');
            } else {
                showToast('Could not open camera: ' + (err && err.message), 'error');
            }
        }
    }

    function closeCamera() {
        cameraScreen.classList.remove('open');
        if (mediaStream) {
            for (const track of mediaStream.getTracks()) track.stop();
            mediaStream = null;
        }
        cameraVideo.srcObject = null;
        torchTrack = null;
        torchOn = false;
        torchBtn.classList.remove('active');
    }

    async function toggleTorch() {
        if (!torchTrack) return;
        try {
            torchOn = !torchOn;
            await torchTrack.applyConstraints({ advanced: [{ torch: torchOn }] });
            torchBtn.classList.toggle('active', torchOn);
        } catch (err) {
            console.error('torch error:', err);
        }
    }

    function captureFrameToBlob() {
        return new Promise((resolve, reject) => {
            const v = cameraVideo;
            const w = v.videoWidth;
            const h = v.videoHeight;
            if (!w || !h) {
                reject(new Error('Camera not ready'));
                return;
            }
            const canvas = document.createElement('canvas');
            canvas.width = w;
            canvas.height = h;
            const ctx = canvas.getContext('2d');
            if (!ctx) { reject(new Error('No canvas context')); return; }
            ctx.drawImage(v, 0, 0, w, h);
            canvas.toBlob((blob) => {
                if (blob) resolve(blob);
                else reject(new Error('Could not encode photo'));
            }, 'image/jpeg', 0.85);
        });
    }

    async function takePhoto() {
        shutterBtn.disabled = true;
        try {
            const blob = await captureFrameToBlob();
            closeCamera();
            await sendReceipt(blob);
        } catch (err) {
            console.error('capture error:', err);
            showToast('Capture failed', 'error');
        } finally {
            shutterBtn.disabled = false;
        }
    }

    // === Send ===
    function pad(n) { return String(n).padStart(2, '0'); }
    function timestampedFilename() {
        const d = new Date();
        return `receipt-${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}-${pad(d.getHours())}${pad(d.getMinutes())}${pad(d.getSeconds())}.jpg`;
    }

    function getName() { return (localStorage.getItem(KEY_NAME) || '').trim(); }

    async function sendReceipt(blob) {
        sendingOverlay.classList.add('open');
        sendingText.textContent = 'Sending receipt…';
        try {
            const filename = timestampedFilename();
            const file = new File([blob], filename, { type: 'image/jpeg' });
            const form = new FormData();
            form.append('file', file);
            const name = getName();
            if (name) form.append('sender_name', name);
            const res = await fetch(SEND_URL, { method: 'POST', body: form });
            const json = await res.json().catch(() => ({}));
            if (!res.ok) {
                throw new Error(json.error || ('HTTP ' + res.status));
            }
            sendingOverlay.classList.remove('open');
            showToast('✓ Receipt sent', 'success');
        } catch (err) {
            console.error('send error:', err);
            sendingOverlay.classList.remove('open');
            showToast('Couldn’t send: ' + (err.message || err), 'error', 5000);
        }
    }

    // === Wire up ===
    openCameraBtn.addEventListener('click', openCamera);
    cancelCameraBtn.addEventListener('click', closeCamera);
    shutterBtn.addEventListener('click', takePhoto);
    torchBtn.addEventListener('click', toggleTorch);

    // Stop camera if page hides (background, lock, etc.)
    document.addEventListener('visibilitychange', () => {
        if (document.hidden && mediaStream) closeCamera();
    });
})();
</script>

</body>
</html>
